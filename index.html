<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Blue Shop</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: linear-gradient(#e6f0ff, #ffffff);
      margin: 0;
      padding: 0;
    }
    header {
      background: #1e3a8a;
      color: white;
      padding: 20px;
    }
    h1 {
      margin: 0;
    }
    .container {
      padding: 30px;
    }
    .box {
      background: white;
      margin: 10px auto;
      padding: 15px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    footer {
      margin-top: 30px;
      padding: 15px;
      background: #1e3a8a;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h1>💙 Blue Shop</h1>
  <p>فروشگاه آنلاین شیک و ساده</p>
</header>

<div class="container">

  <div class="box">✨ اکسسوری فانتزی</div>
  <div class="box">👜 کیف و لوازم</div>
  <div class="box">🎁 محصولات خاص</div>

</div>

<footer>
  تماس برای سفارش 📞
</footer>

</body>
</html>
