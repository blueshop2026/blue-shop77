<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Blue Shop</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3ff;
  text-align:center;
}

header{
  background:#1e3a8a;
  color:white;
  padding:20px;
  position:relative;
}

.logo{
  width:70px;
  height:70px;
  border-radius:50%;
  background:white;
  margin:10px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#1e3a8a;
}

.menu-btn{
  position:absolute;
  right:15px;
  top:15px;
  font-size:28px;
  cursor:pointer;
}

.menu{
  display:none;
  position:absolute;
  right:10px;
  top:50px;
  background:white;
  width:200px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.menu a{
  display:block;
  padding:10px;
  text-decoration:none;
  color:black;
  border-bottom:1px solid #eee;
}

.container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  padding:20px;
}

.card{
  background:white;
  width:180px;
  margin:10px;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="menu" id="menu">
    <a href="https://t.me/shopblur33" target="_blank">تلگرام</a>
    <a href="#">ثبت سفارش</a>
    <a href="tel:09960909804">شماره پشتیبانی</a>
  </div>

  <img src="logo.png" style="width:80px;height:80px;border-radius:50%;display:block;margin:10px auto;">
  <h1>Blue Shop</h1>
  <p>فروشگاه اکسسوری</p>

</header>

<div class="container">
  <div class="card">جاکلیدی</div>
  <div class="card">دستبند</div>
  <div class="card">گردنبند</div>
</div>

<script>
function toggleMenu(){
  var m = document.getElementById("menu");
  m.style.display = (m.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
